services:
  nginx:
    image: nginx:alpine
    container_name: shiny-proxy
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shiny
    restart: unless-stopped
    networks:
      - shiny_net

  shiny:
    build: .
    image: modulo-reportes:latest
    restart: unless-stopped
    env_file:
      - .env
    # Seguridad
    user: "shiny"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Recursos por réplica
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Directorios temporales en memoria
    tmpfs:
      - /tmp
      - /run
    # Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3838"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - shiny_net

networks:
  shiny_net:
    driver: bridge