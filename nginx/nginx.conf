events {
  worker_connections 1024;
}

http {

  # ── Upstream: 4 réplicas nombradas individualmente ──────────────────────
  # Con replicas anónimas (server shiny:3838), nginx no puede retirar una
  # instancia caída ni medir errores por réplica. Al nombrarlas, nginx
  # puede hacer fail-over real y reportar health por instancia.
  #
  # least_conn: enruta cada nueva conexión a la instancia con menos
  # conexiones activas. Más justo que round-robin para sesiones Shiny largas
  # (un cálculo de 10s no penaliza a la instancia que lo está procesando).
  upstream shiny_backend {
    least_conn;

    server shiny_1:3838 max_fails=3 fail_timeout=15s;
    server shiny_2:3838 max_fails=3 fail_timeout=15s;
    server shiny_3:3838 max_fails=3 fail_timeout=15s;
    server shiny_4:3838 max_fails=3 fail_timeout=15s;

    # keepalive: mantiene conexiones HTTP persistentes hacia los workers Shiny
    # para reducir overhead de handshake en cada request (especialmente útil
    # para los polling de Shiny sobre conexiones WebSocket largas).
    keepalive 32;
  }

  server {
    listen 80;

    # ── Timeouts generosos para sesiones Shiny largas ──────────────────────
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout  10s;

    location / {
      proxy_pass         http://shiny_backend;
      proxy_http_version 1.1;

      # Obligatorio para WebSocket (Shiny usa WS para comunicación reactiva)
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;

      # Si una réplica falla en la conexión inicial, nginx reintenta con otra.
      # "non_idempotent" permite reintentar POSTs (carga de filtros Shiny).
      proxy_next_upstream error timeout http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    # ── Health check propio del nginx ─────────────────────────────────────
    # Devuelve 200 inmediatamente; el load balancer externo (o Docker) puede
    # llamar a /nginx-health para verificar que nginx está vivo.
    location /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}