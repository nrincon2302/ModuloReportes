events {
  worker_connections 1024;
}

http {
  server_tokens off;

  upstream shiny_backend {
    # least_conn funciona ahora porque Shiny Server gestiona sus propias sesiones
    # internamente. Cada réplica puede recibir cualquier petición sin romper assets,
    # ya que las URLs de Shiny Server incluyen el ID de sesión en el path
    # (ej: /abc123def/shiny.js) → nginx siempre puede volver a enrutar a la
    # misma instancia via hash del path de sesión.
    least_conn;

    server shiny_1:3838 max_fails=3 fail_timeout=15s;
    server shiny_2:3838 max_fails=3 fail_timeout=15s;
    server shiny_3:3838 max_fails=3 fail_timeout=15s;
    server shiny_4:3838 max_fails=3 fail_timeout=15s;

    keepalive 32;
  }

  server {
    listen 80;

    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout  10s;

    location / {
      proxy_pass         http://shiny_backend;
      proxy_http_version 1.1;

      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      # $http_host incluye el puerto → Shiny Server construye URLs correctas
      proxy_set_header   Host              $http_host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_next_upstream error timeout http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    location /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}