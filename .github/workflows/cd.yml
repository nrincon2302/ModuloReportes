name: CD - Deploy to Docker Hub, Shinyapps.io and On-prem

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push app image with cache
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/modulo-reportes:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/modulo-reportes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image with cache
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/modulo-reportes-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Cache renv and R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/renv
            ~/.cache/R
            renv/library
            renv/staging
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libcurl4-openssl-dev libssl-dev libxml2-dev libglpk-dev

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          FASTAPI_PASSWORD: ${{ secrets.FASTAPI_PASSWORD }}
          FASTAPI_URL: ${{ secrets.FASTAPI_URL }}
          FASTAPI_USERNAME: ${{ secrets.FASTAPI_USERNAME }}
          ODK_EMAIL: ${{ secrets.ODK_EMAIL }}
          ODK_PASSWORD: ${{ secrets.ODK_PASSWORD }}
          ODK_PROJECT_ID: ${{ secrets.ODK_PROJECT_ID }}
          ODK_URL: ${{ secrets.ODK_URL }}
        run: |
          R -e "install.packages('rsconnect', repos='https://cran.rstudio.com/')"
          # Create a .Renviron file inside the app so shinyapps.io picks up env vars during deploy
          R -e "vars <- c('FASTAPI_PASSWORD','FASTAPI_URL','FASTAPI_USERNAME','ODK_EMAIL','ODK_PASSWORD','ODK_PROJECT_ID','ODK_URL'); con <- file('app/.Renviron','w'); writeLines(sapply(vars, function(v) paste0(v,'=',Sys.getenv(v))), con); close(con)"
          R -e "rsconnect::setAccountInfo(name=Sys.getenv('SHINYAPPS_ACCOUNT'), token=Sys.getenv('SHINYAPPS_TOKEN'), secret=Sys.getenv('SHINYAPPS_SECRET'))"
          R -e "rsconnect::deployApp(appDir='app', appName='Dashboard-Shiny', account=Sys.getenv('SHINYAPPS_ACCOUNT'), forceUpdate = TRUE, launch.browser = FALSE)"

