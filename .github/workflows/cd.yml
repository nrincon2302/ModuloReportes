name: CD - Deploy to Docker Hub, Shinyapps.io and On-prem

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        run: |
          APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/modulo-reportes:latest
          SHA_TAG=${{ secrets.DOCKERHUB_USERNAME }}/modulo-reportes:${{ github.sha }}
          docker build -t "$APP_IMAGE" .
          docker tag "$APP_IMAGE" "$SHA_TAG"
          docker push "$APP_IMAGE"
          docker push "$SHA_TAG"

      - name: Build and push nginx image (custom config)
        run: |
          NGINX_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/modulo-reportes-nginx:latest
          # Build inline Dockerfile from nginx/ folder (copies nginx.conf)
          docker build -t "$NGINX_IMAGE" -f - ./nginx <<'EOF'
          FROM nginx:alpine
          COPY nginx.conf /etc/nginx/nginx.conf
          EOF
          docker push "$NGINX_IMAGE"
          
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libcurl4-openssl-dev libssl-dev libxml2-dev libglpk-dev

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          R -e "install.packages('rsconnect', repos='https://cran.rstudio.com/')"
          R -e "rsconnect::setAccountInfo(name=Sys.getenv('SHINYAPPS_ACCOUNT'), token=Sys.getenv('SHINYAPPS_TOKEN'), secret=Sys.getenv('SHINYAPPS_SECRET'))"
          R -e "rsconnect::deployApp(appDir='app', appName='modulo-reportes', account=Sys.getenv('SHINYAPPS_ACCOUNT'))"

