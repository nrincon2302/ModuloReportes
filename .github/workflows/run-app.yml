name: CI - Ejecución de la app

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-app:
    name: Build, run and smoke-test the Shiny app
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache renv and R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/renv
            ~/.cache/R
            renv/library
            renv/staging
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build image with Buildx and cache
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: modulo-reportes:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d \
            --name modulo-reportes-test \
            -p 3838:3838 \
            --env-file .env.example \
            modulo-reportes:ci

      - name: Wait for Shiny to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3838 > /dev/null; then
              echo "Shiny is up 🚀"
              exit 0
            fi
            echo "Waiting for Shiny..."
            sleep 2
          done
          echo "Shiny did not start in time ❌"
          docker logs modulo-reportes-test
          exit 1

      - name: Stop container
        if: always()
        run: |
          docker stop modulo-reportes-test || true
          docker rm modulo-reportes-test || true
          docker image rm modulo-reportes:ci || true
