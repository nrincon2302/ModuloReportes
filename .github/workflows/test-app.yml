name: CI - Pruebas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  r-tests:
    name: Ejecutar tests de R y construir imagen
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Cache renv and R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/renv
            ~/.cache/R
            renv/library
            renv/staging
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-dev libssl-dev libcurl4-openssl-dev libglpk-dev

      - name: Restore renv and install testthat
        run: |
          R -e "install.packages('renv', repos='https://cran.rstudio.com/')"
          R -e "renv::restore(); if (!requireNamespace('testthat', quietly = TRUE)) install.packages('testthat', repos='https://cran.rstudio.com/')"

      - name: Run R unit tests (if present)
        run: |
          R -e "if (dir.exists('tests')) { cat('Running tests in tests/\n'); testthat::test_dir('tests/testthat') } else if (dir.exists('app/tests')) { cat('Running tests in app/tests/\n'); testthat::test_dir('app/tests/testthat') } else { cat('No tests found, skipping.\n') }"

      - name: Lint R (optional)
        run: |
          R -e "if (!requireNamespace('lintr', quietly = TRUE)) install.packages('lintr', repos='https://cran.rstudio.com/')"
          R -e "if (dir.exists('R')) lintr::lint_dir('R') else cat('No R/ dir for lintr.\n')"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build image with Buildx and cache
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: modulo-reportes:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Remove local test image
        if: always()
        run: |
          docker image rm modulo-reportes:ci || true
