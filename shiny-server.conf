# Shiny Server spawna un proceso R separado por sesión.
# Así cada tab/usuario corre en total aislamiento sin bloquear a otros.

run_as shiny;

server {
  listen 3838;

  location / {
    site_dir /srv/shiny-server;
    log_dir  /var/log/shiny-server;

    # simple_scheduler: un proceso R nuevo por cada sesión.
    # max_reqs_per_proc=1 garantiza que ninguna sesión comparte proceso con otra.
    # idle_timeout_per_session: mata el proceso si la sesión lleva N segundos inactiva.
    simple_scheduler {
      max_reqs_per_proc    1;
      idle_timeout_per_session 60;
    }

    # Número máximo de procesos R simultáneos por réplica.
    # 4 réplicas × 5 sesiones = 20 sesiones paralelas máximo en el stack.
    # Ajusta según la RAM disponible (cada proceso R toma ~200-400 MB).
    app_init_timeout 120;
    app_idle_timeout 120;
  }
}